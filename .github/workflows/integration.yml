name: Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  integration:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y sqlite3 curl
    
    - name: Run integration tests
      run: |
        chmod +x ./test/integration.sh
        ./test/integration.sh
    
    - name: Test Docker build
      run: |
        docker build -t backfeedr:test .
        docker run -d --name backfeedr-test -p 8081:8080 backfeedr:test
        sleep 5
        curl -f http://localhost:8081/api/v1/health || exit 1
        docker stop backfeedr-test
        docker rm backfeedr-test
