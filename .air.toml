# air.toml - Live reload for Go (2026)
# Install: go install github.com/cosmtrek/air@latest
# Run: air

root = "."
test_dir = ""
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/backfeedr"
  cmd = "go build -o ./tmp/backfeedr ./cmd/backfeedr"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "web/static"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "0s"
  log = "build-errors.log"
  send_interrupt = false
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
