# golangci-lint configuration (2026)
# Modern linting for Go 1.22+

run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    # Standard linters
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Style linters
    - gofmt
    - goimports
    - golint
    - misspell
    - stylecheck
    # Security linters
    - gosec
    - tparallel
    # Performance
    - prealloc
    - gocritic

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/steviee/backfeedr
  misspell:
    locale: US
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style

issues:
  exclude-use-default: false
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gosec
        - dupl
    # Exclude shadow checking for context
    - text: "shadow: declaration of .err. shadows declaration"
      linters:
        - govet
